services:
  mongodb:
    image: mongo:7
    container_name: medresearch-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: medresearch-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # GPU? Uncomment the deploy block below (requires NVIDIA Container Toolkit).
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until ollama list >/dev/null 2>&1; do echo 'waiting for ollama...'; sleep 2; done;
       ollama pull ${OLLAMA_MODEL:-llama3.1:8b-instruct-q4_K_M};
       ollama pull ${OLLAMA_EMBED_MODEL:-nomic-embed-text}"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medresearch-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      ollama:
        condition: service_started
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/medresearch
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b-instruct-q4_K_M}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - JWT_SECRET=${JWT_SECRET:-change_this_to_a_random_value_at_least_32_characters_long}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:5173}
      - NCBI_API_KEY=${NCBI_API_KEY:-}
      - OPENALEX_MAILTO=${OPENALEX_MAILTO:-}
      - RATE_LIMIT_PER_MIN=${RATE_LIMIT_PER_MIN:-30}

  mongo-express:
    image: mongo-express:latest
    profiles: [dev]
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_BASICAUTH=false

volumes:
  mongo_data:
  ollama_models:
